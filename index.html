    <style id="theme-critical">
      html[data-theme='dark'] {
        color-scheme: dark;
        --color-ink: #f0eeea;
        --color-hero-canvas: #040404;
        --color-paper: #101010;
        --color-accent: #de3e18;
        --color-rule: rgba(255, 255, 255, 0.12);
      }
    </style>
    <title>Joseph Patrick Roberts — Principal Product Designer</title>
    <script>
      (function () {
        try {
          if (new URLSearchParams(location.search).get('continuous') !== '0') {
            document.documentElement.classList.add('continuous-chapters');
          }
          var pref = localStorage.getItem('theme-preference');
          var theme =
            pref === 'light' || pref === 'dark'
              ? pref
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.dataset.theme = theme;
          if (theme === 'dark') {
            document.documentElement.style.colorScheme = 'dark';
          }
          if (window.scrollY <= 24) {
            document.documentElement.classList.add('in-hero-scroll');
          }
        } catch (e) {}
      })();
    </script>
